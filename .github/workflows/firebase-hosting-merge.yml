# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      # 1. Prepara o .NET 8
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
          
      # 2. Compila o jogo (inclui wwwroot/js e appsettings de produção)
      - name: Publish Blazor App
        run: dotnet publish NaoComemoreAntesdoFim.csproj -c Release -o release

      # 3. Envia site + firebase.json (rewrite /api -> Cloud Run) para o Firebase
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_AERA_CLOUD }}'
          channelId: live
          projectId: aera-cloud
          target: jogosud
